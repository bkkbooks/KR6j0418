body:
  text: 宋契丹國師中天竺摩竭陀國三藏法師慈賢譯爾時世尊說是法已會中有無盡意菩薩從座而起繞佛三匝却住一面白佛言世尊我等雖已見聞未曾有此大粉壇作觀修行祕密之法我等只依此法門而修行之復依何法而修行之爾時世尊告無盡意菩薩言我證菩提復應受持過去諸佛同共宣說大曼拏羅壇場聖衆真言汝等受持速得成佛汝等諦聽當為汝說爾時無盡意菩薩白佛言世尊大慈為我演說我等樂聞爾時世尊即說請吾功德無盡真言曰曩謨引沒馱野一曩謨引達囉磨二合野一曩謨引僧去聲伽去聲野一曩謨引設枳也二合母曩曳一怛他去聲蘖哆野一囉曷二合帝一三去聲藐三去聲沒馱野一唵引一阿入聲弭哆鉢囉二合陛一尾補攞蘗囉陛二合一鉢囉二合嚩囉冒地薩弭一悉地也二合摩賀引蘖哩二合陛一覩拏覩拏一娑嚩二合賀引爾時世尊說是真言已告無盡意菩薩言若有大乘行者建此壇場請五阿闍梨各於隨門獻淨水灑塗香散時華燒酥燈并諸供養咸悉奉獻念此密言皆一七遍爾時世尊復告無盡意菩薩言汝應受持普請大曼拏羅壇場聖衆真言汝若受持能脫惡道救諸衆生若有行人建此壇場請五阿闍梨隨門念此真言凡獻諸供養恆想諸佛衆誦此祕密言普請真言曰曩謨引囉怛曩二合怛囉二合夜野一曩謨引阿去聲哩也二合訖囉二合野麼多上聲曳一冒地薩怛嚩二合野一摩賀引迦嚕抳迦野一怛儞也二合他去聲一唵引一阿上聲訖囉二合野一尾入聲麼黎一三去聲滿多訖囉二合野羯攞陛一蘖囉枲星異切一三去聲母捺囉二合娑去聲誐囉訖囉二合野悉地也二合一入嚩二合哩多上聲三去聲滿多上聲引訖囉二合野布囉儞二合一冒地唧哆楞去聲迦囉訖囉二合野布囉儞二合一摩賀抳也二合曩上聲娑去聲誐囉訖囉二合野戌上聲計一唵引一訖囉二合抳訖囉二合抳一怛他去聲迦捨訖囉二合野鉢囉二合嚩哩一冒地也二合冒地也二合冒馱野引冒馱野一阿上聲訖囉二合野羯㘑二合灑尾入聲秫入聲弟一蘖誐曩訖囉二合養一誐平聲誐曩迦攞跛二合訖囉二合曳一三去聲滿多上聲迦攞戍上聲悉地也二合悉地也一薩囉薩囉一薩囉嚩二合播跛嚩囉曩訕所晏切帝一鉢囉二合訕去聲麼曩一吽吽吽一唵引一阿上聲訖囉二合夜嚩入聲囉曩上聲尾穆訖帝二合一努嚕努嚕一誐曩尾入聲誐帝三去聲滿多濕嚩二合娑上聲羯哩一跛哩布囉拏二合摩努去聲囉剃一怛囉怛囉一跢入聲囉野覩𤚥一麼麼上聲濕嚩二合薩野一尾入聲補攞蘖囉陛二合娑嚩二合賀引爾時世尊說是真言已復告無盡意菩薩汝應受持內外結淨真言若復有人建置壇場請五阿闍梨隨門默念此真言加持淨水將此淨水以自手掌自灌其頂及自飲已能消災橫獲大吉祥及為道場主灑入壇路及灑一切供養物等默誦此真言加持即說內外結淨真言曰唵引一尾誐多嚩囉曩上聲一三去聲滿多跛哩數馱𩕳一唵引一麼抳麼抳一佉上聲囉佉上聲囉一乞叉二合野蘖賀禰一吽吽一娑嚩二合賀引無盡意菩薩復有普請阿彌陀如來阿閦如來毗盧遮那如來真言及想三佛種智字亦應受持若復有人建置壇場請五阿闍梨各想自身為釋迦牟尼佛寶閣然請三佛及想種智念此普請真言一七遍唵引一弭哩弭哩一弭哩弭哩一伽囉二合野伽囉二合野一訖囉二合野一訖囉二合野一暗陀一憾閦一暗亞降切盧一母𩕳母𩕳一鉢囉二合薩囉鉢囉二合薩囉一訖囉二合曳一娑嚩二合賀引佛告無盡意菩薩復有普請八大菩薩及四大天四大天王四大天女真言汝當受持若有衆生恆時供養默誦持者能殄障惱獲大智慧能開五眼利益無量即說普請真言曰曩麼引囉怛曩二合怛囉二合夜野一曩麼阿去聲哩也二合嚩路枳帝濕嚩二合囉野一冒地薩怛嚩二合野一摩賀引薩怛嚩二合野一摩賀引迦嚕抳迦野一伊上聲呬曳二合呬入聲一鉢囉二合娑去聲曩上聲矩嚕一怛儞也二合他去聲一矩㘑矩㘑一矩㘑毗夜二合一娑嚩二合賀引無盡意菩薩復有普供養八大菩薩真言我今宣說若有衆生虔誠供養默誦持者能令衆生獲四無礙辨增長福德即說普供養真言曰曩麼引悉底二合踰迦曩上聲闥野一路迦寫呬上聲多劍上聲播夜一曩麼引悉底二合尾濕嚩二合嚕播野一薩嚩嚩誐毗喻二合曩謨曩麼引復次無盡意菩薩我有歸命供養金剛王大天真言汝當受持若有衆生香華供養默誦持者能拔有情出於三界獲大菩提即說歸命供養真言曰如同上說無盡意菩薩復有歸命供養大大天真言汝當受持若有衆生種種供養默誦持者同於諸佛天龍侍衛功德無量難可具宣即說歸命供養真言曰唵引一曩上聲麼引始嚩野一扇上聲多野一迦囉曩怛囉二合野一係多吠一𩕳吠娜夜弭一左怛麼二合南上聲一怛岡二合蘖帝一播囉弭濕嚩二合囉一一底一娑嚩二合賀引無盡意菩薩復有歸命供養大自在天真言汝當受持若有衆生恭敬供養默誦持者能令有情得免輪回獲大自在親自擁護求者遂願即說歸命供養真言曰唵引一曩謨引摩賀引儞去聲嚩野一摩賀引背蒲來切囉嚩野一摩賀引麼呬上聲濕嚩二合囉野一薩嚩儞入聲嚩多一布𠰒多一曩謨引塞訖哩二合跢野一娑嚩二合賀引無盡意菩薩復有歸命供養黑大天真言汝當受持若有衆生恆時供養默誦持者所辦事業皆得圓滿即說歸命供養真言曰唵引一曩謨引摩賀引迦攞野一底哩二合補囉引蘖囉二合娜賀曩野一薩嚩儞去聲嚩阿去聲婆去聲養娜那去聲野一薩嚩婆去聲曳引毗藥二合一怛囉二合拏上聲迦囉上聲野一薩娑嚩二合賀引無盡意菩薩復有普請四大天王真言汝當受持若有衆生常當供養默誦持者能殄障惱獲大吉祥富貴自在壽命延長即說普請真言曰唵引一曩謨引拶咄嚕二合摩賀引路迦播攞野一尾嚕拏入聲迦一尾嚕播乞叉二合一地哩二合怛囉上聲瑟姹二合一矩吠囉能上聲一伊上聲帝曳二合爽一薩嚩儞去聲嚩南上聲一布紫也二合演底布曩布曩一薩嚩沫陵上聲一薩嚩度播一薩嚩儞入聲𠰢一怛體嚩入聲左頗攞嚩入聲娑怛囉二合一攃怛𠻴二合左曼娜𩕳一鉢囉二合抳鉢底曳二合一惹入聲蘖多二合虞上聲嚕一唵引一室哩二合吠無昧切室囉二合麼曩野一補嚕𤚥二合蘖謎一曩麼引薩一娑嚩二合賀引無盡意菩薩復有普請法語天女主寶天女吉祥天女降魔天女真言汝當受持若有衆生隨分供養默誦持者四大天女恆與衆生作大利益凡辦壇場或諸事業悉垂加護皆得圓滿即說普請四大天女真言曰唵引一惡乞叉二合麼抳一三去聲麼曳曩一吽一阿去聲哩也二合屈呂二合毗夜二合一細喻二合鉢卑夜二合娜野一曩母曼祖室哩二合夜野一矩麼囉部跢去聲野一怛儞也二合他去聲一唵引一室哩二合蘖哩鼻二合一麼抳蘗哩鼻二合一卑夜二合娜野蘗哩鼻二合一三去聲麼三去聲滿多蘗哩鼻二合一布惹嚩日哩二合抳一娑嚩二合賀引無盡意菩薩復有法語天女真言汝當受持若有衆生恆默誦持或常供養此人現世獲大智慧明記不忘即說法語天女真言曰唵引一曩母引薩囉娑嚩二合帝一曩麼引娑覩二合毗樣二合一囉儞夜二合引迦麼左嚕抳一尾儞也二合囕鼻一羯哩灑弭一悉地婆去聲嚩覩銘娑上聲娜引一娑嚩二合賀引無盡意菩薩復有主寶天女真言汝當受持若有衆生常默誦持供養恭敬此人現世少病少惱無有非人得其魔便離諸災難即說主寶天女真言曰曩謨引娑覩二合訶哩底也二合曳一捺舍儞誐路迦播攞室者二合一薩嚩吠阿入聲怛囒二合拏羯哩一囉入聲訖𠻴二合矩嚕滿覩一薩嚩尾怛一訖哩二合惹拏二合賀囉𩕳一訶哩多曳二合薩一娑嚩二合賀引無盡意菩薩復有吉祥天女真言汝當受持若有衆生供養恭敬默誦持者此人現世富貴自在於當來世獲得身相圓滿即說吉祥天女真言曰唵引一室哩二合悟哩一唵引一室哩二合攞佉弭二合一唵引一室哩二合野灑濕吠二合𩕳一唵引一室哩二合沫蘇上聲地沫蘇上聲馱囉一曩麼引馱囉抳一室哩二合儞尾一野灑濕吠二合𩕳一娑嚩二合賀引無盡意菩薩復有降魔天女真言汝當受持若有衆生供養恭敬默誦持者此人現世凡辦事業皆得成就一切天魔不能得便即說降魔天女真言曰唵引一嚩日囉二合句嚕二合地濕嚩二合哩一摩賀引贊上聲致𩕳一摩賀引尾入聲儞也二合濕嚩二合哩一摩賀引沫泗上聲濕嚩二句哩一摩賀引餉企𩕳一摩賀引曩儞𩕳一尾濕尾二合濕嚩二合哩一麼呬上聲濕嚩二合哩一薩嚩囉達二合悉地羯哩一曩麼一娑嚩二合賀引無盡意菩薩復有加持飲食真言汝當受持若未來世有傳教師以諸飲食各碎少許共盛一器於壇前坐安左掌內念此真言加持七遍每至昏時往於壇外而以右手十方俵散為不能入曼拏大壇諸天鬼神而為供養依如是法所求遂願亦名隨求真言即說加持飲食真言曰曩謨引囉怛曩二合怛囉二合夜野一曩麼阿去聲哩也二合嚩路枳帝一濕嚩二合囉野一地薩怛嚩二合野一摩賀引薩怛嚩二合野一摩賀引迦嚕抳迦野一怛儞也二合他去聲一矩黎矩黎一矩黎毗夜二合一娑嚩二合賀引無盡意菩薩復有遮一切惡魔消災除橫真言汝當受持若未來世有傳教師以線一條生酥黃芥子相和誦此真言加持二十一遍線用闌界壇場一切惡魔不能得入若有病人而用此線繫胭頸上當繫之時以此真言加持二十一遍病即除差生酥黃芥子以火燒之熏道場主滅其重罪若有病人以此生酥及黃芥子燒之熏病人鼻及所臥處其病即愈當熏之時亦念此真言加持二十一遍或以加持淨水闌界壇場亦念此真言邪魔不能得入若有病人加持淨水念此真言二十一遍以加持水灑其病人病即除愈若有衆生恆誦持者所有災患皆得消滅即說消災除橫真言曰唵引一怛儞也二合他去聲一唧哩唧哩摩買引唧哩一覩拏上聲覩拏摩賀引覩拏一入嚩二合黎入嚩二合黎摩賀引入嚩二合黎一呬上聲禮呬禮摩賀引呬禮一娑嚩二合賀引爾時世尊說是摩訶三昧耶祕密法已彌勒菩薩等聞佛所說踊躍歡喜信受奉行
