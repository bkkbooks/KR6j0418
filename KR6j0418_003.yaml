body:
  text: 宋契丹國師中天竺摩竭陀國三藏法師慈賢譯爾時世尊告彌勒菩薩曰既繫念已再入觀門先想頂內而作其壇即想安置頂內蓮華其華八葉於蓮華內想金剛地金剛地上想日月輪於日輪上想十二字月輪之上想十六字梵字之母出生諸法不可得故於月輪上想安唵字又觀唵字想為菩薩旋復而去十方世界隨意供養諸佛聖賢既供養已良久而來作輪子形復想一返為毗盧佛餘四方佛次第想安悉皆同等先想種智及想梵號兼想五印四波羅密準四佛作而居四隅坐三重座無其月輪下至明王悉皆如是已上九位居第一院內八菩薩想種智字及想密號兼想印契於第二院四門左右次第分布外十二尊十明王等亦想種智及其密號兼想菩薩所執獻物及想十方明王印相次第當説東方明王印戒方背相鉤禪智捻忍願曲進伸力度檀慧似如鉤向左而成印以牙齧下脣斜目視於印左足似如鉤左腳斜直立而成鉤召契南方明王印戒方進力背相鉤同前禪智捻忍願檀慧如前亦似鉤餘相並同東明王亦號名為鉤召印西方明王印檀慧進力而相鉤禪智押戒忍方願印向左而安立勢餘相亦如東明王而號名為法定印北方明王印戒方忍願合相鉤進力相鉤亦復耳禪智以峯自相拄檀慧而伸合額左餘相並同東明王號為降伏自在印東南方明王印檀慧背相鉤禪智捻忍願戒方進力竪心左而安置斜目而視之餘相同北方名為最勝印西南方明王印檀慧內相鉤戒方曲入掌忍願似微曲進力次微曲禪智亦微曲仰印而向口張口牙須現努目而視之闊足而正立號曰為口印西北方明王印禪智捻檀慧六度而直竪二羽而相交以右而押左努目而正視齧脣小偏立名為大力印東北方明王印二羽外相叉印相如淨地正齧於下脣努目正視印二足安立相似闊而正立號為無動印下方明王印二羽內相叉禪智捻忍願進力峯相合仰峯而向下印左努目視偏齧於下脣右存斜左足名為推障印上方明王印不改前印相印峯舉於上合印向額左努目似下視齧脣與立相同下方明王名為佛頂印此十大明王而居第三院依位想安布乃成頂內壇頂內佛壇竟觀身為毗盧出觀念佛壇至唵字默念真言曰沒馱嚩日囉二合達囉室哩二合一滿曩二合底哩二合嚩日囉二合鼻儞野二合婆去聲尾曩上聲二阿上聲地瑟姹二合曩播能上聲弭儞養二合三迦嚕去聲凍迦野嚩日哩二合曩上聲四娜舍捺擬二合僧去聲悉體二合哆五沒馱屈俱律切鑁覩六迦野嚩日哩二合曩七唵引八薩嚩怛他去聲誐哆九迦野嚩日囉二合娑嚩二合婆去聲嚩怛麼二合句憾引十默念佛壇已然想口中壇五佛四波羅內外十二尊十大明王等布置想次第亦如頂內壇唯想阿字形而成大法壇種智與密號印契執物等一同前觀想而成無量壽出觀念法壇至唵字默念真言曰達囉謨二合吠嚩迦播他去聲室哩二合一滿曩二合底哩二合嚩日囉二合鼻儞野二合婆去聲尾曩二阿地瑟姹二合曩上聲播能上聲弭儞養二合三迦嚕去聲凍嚩誐嚩日哩二合曩上聲四娜舍捺擬二合僧去聲悉體二合哆五沒馱屈俱律切鑁覩六嚩誐嚩日哩二合曩上聲七唵引八薩嚩怛他去聲誐哆九嚩誐嚩日囉二合婆嚩二合婆去聲嚩怛麼二合句憾引十默念法壇已然想阿閦尊成心壇位次唯觀吽字形而成大僧壇諸佛大菩薩十大明王等想印及密號布置次第等並同頂內壇而成阿閦佛出觀念僧壇至唵字默念真言曰唧哆嚩日囉二合達囉室哩二合一滿曩二合底哩二合嚩日囉二合鼻儞野二合婆去聲尾曩上聲二阿地瑟姹二合曩上聲播能上聲弭儞養二合三迦嚕上聲凍唧哆嚩日哩二合曩上聲四娜舍捺擬二合僧去聲悉體二合哆五沒馱屈俱律切鑁覩六誐哆嚩日囉二合曩上聲七唵引八薩嚩怛他去聲誐哆九唧哆嚩日囉二合娑嚩二合婆去聲嚩怛麼二合句憾引十想成三壇已安心寂不動即以金剛索繫閉六根門隨念隨一繫如彼金剛甲真言曰唵砧嚩日囉二合𠸪乞囉二合想成三壇已然可而出觀應以殷重心歸命三寶壇振鈴誦密語真言曰曩上聲謨沒馱野一曩上聲謨達囉磨二合野二曩謨僧去聲伽野三阿婆去聲吠婆去聲嚩曩上聲婆去聲嚩四婆去聲嚩曩上聲禰嚩婆去聲嚩曩五伊上聲底婆去聲舞麼婆去聲嚩寫怛養二合六婆去聲嚩南努播攞毗夜二合帝七阿上聲儞野二合弭薩頗楞上聲惹囉𤚥二合八阿上聲儞野二合弭薩頗楞上聲多播九阿儞野二合弭薩頗楞上聲地野二合南十阿上聲儞野二合弭尾𩕳謨乞哩二合黨引十一歸命三寶已然後再入觀面前想一壇下是風火水土輪最居上土上四色鐵先鐵次銅銀最後用其金上有三角土是為雜寶地然後而出觀而以兩手叉掌心按於地印成金剛地如此而安置然可再入觀應觀阿字形而在壇中住想字去其光復來為蓮華次應想吽字而居蓮中住作寶金剛地復想字梵云沒籠二合此言佛寶閣表大毗盧身想為白光明光明去復來而作輪子形想輪為白光去乃而復來而成七寶閣內有曼拏羅而有三重界每界有四門四門各四色東白南青色西紅北金色想於其壇中而有日月輪復想唵阿吽想於月輪上東西而安置從東唵阿吽先觀唵字體想為八菩薩觀自在為首想往十方界供養於諸佛次想阿字起想為八菩薩大悲而為首亦住十方界供養於諸佛次想吽字起想為八菩薩金剛手為首亦往十方界供養諸如來想唵八菩薩供養已而來想共為佛輪想阿八菩薩供養已而來想成八葉蓮在於佛輪上想吽八菩薩供養已而來如半五杵形想居蓮葉上想前三種智所起八菩薩去來並相次復想輪蓮杵共出五色光亦想往十方良久而復收渾融於一處而居蓮葉上然想四波羅依方位次第各