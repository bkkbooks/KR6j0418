body:
  text: 宋契丹國師中天竺摩竭陀國三藏法師慈賢譯爾時世尊既加持已告彌勒菩薩曰汝等願受灌頂先結曼拏羅大壇而受灌頂爾時世尊既結壇已即說五如來灌頂真言曰唵引戌上聲抳野二合多儗野二合曩上聲嚩日囉二合娑嚩二合婆去聲嚩答麼二合句憾引東門金剛水灌頂是真法王子南門寶蓮華金剛水灌頂得聽祕密法自在無礙西門智金剛水灌頂獲得三業清淨圓滿北門羯囉磨二合金剛五甘露水灌頂得越輪迴戒法圓滿堪為佛使受四門灌頂已彌勒菩薩等踊躍歡喜慇懃謝已世尊告曰我復有中方根本智金剛水灌頂能斷煩惱所知二障能證真理汝當復受彌勒菩薩等聞如是語依教奉行乃受灌頂即說中方根本智金剛水灌頂真言曰唵引一達囉磨二合馱覩嚩日囉二合娑嚩二合婆去聲嚩怛麼二合句憾引二受灌頂已彌勒菩薩等歡喜無量共自歎曰我等今生獲其果阿上聲儞也二合弭薩頗楞上聲惹囉𤚥二合一句精進諷誦世尊教阿上聲儞也二合弭薩頗楞上聲答入聲跛一句常習如來大正定阿上聲儞也二合弭薩頗楞上聲地也二合曩上聲一句必能永離輪迴道阿上聲儞也二合弭尾入聲𩕳穆訖哩二合黨一句爾時彌勒菩薩等共自歎已而白佛言世尊此祕要最上法門於何佛聞師何佛學依之修行獲大神通得大菩提世尊告曰汝等有大智慧作如是問汝等諦聽當為汝說我於過去無量劫中與金剛大平等菩薩金剛大身菩薩金剛大辯菩薩金剛大意菩薩金剛大三摩地菩薩金剛大降魔菩薩而為上首及十七大菩薩并無量菩薩等向於大毘盧遮那如來所聞如是法作如是觀祕密修行得成正覺過去諸佛若不依此法門無由得證於菩提彌勒菩薩等聞佛所說咸生歡喜復白佛言世尊大慈大悲見垂哀愍我誓修行求無上覺唯願世尊分別演說祕密法門世尊告曰汝等諦聽當為汝說我生王宮至年十六因遊四門見老病死及見沙門別教廣明遂悟無常輪迴不息年至十七夜半踰城到畢鉢羅林於其林中一十二年苦行修行每一年中苦行各別一年林中持鉢而食林中多有樹神一年食其草根一年食其雜果一年食其雜葉一年食其香汁一年食悉底也二合此言水中果也一年食吉祥果如此土香桃也一年日食棗一顆一年日三時飲水一年日二時飲水一年樹下習禪不起以手搆者果葉而食一年坐禪食氣如此土胎息休糧也至第十二年極苦修行未成正覺乃有過去毘婆尸佛等垂大慈悲勅大弟子遂告吾曰我是過去六佛大弟子也奉佛教勅故來相告太子如斯苦行修行終未能證無上菩提太子速離宴座食於乳麋經於一月再詣本座必證菩提言訖忽然不見吾乃依教奉行却詣本林而坐之次乃自思惟空中告曰我苦行一十二年未證菩提乃有聖者語我我是過去六佛大弟子也今日却詣本林依何行願作法法門得成正覺言訖過去六佛應聲即至而告之曰大善男子若要成正覺須詣菩提樹依過去諸佛祕密觀門課誦修行經一十二月決成正覺吾聞說是已依教奉行果證菩提汝等若不依此祕密觀門課誦修行終不成於無上菩提彌勒菩薩等聞如是已發希有心白佛言世尊願為我等速演妙法我等樂聞世尊告曰汝等諦聽當為汝說凡欲作觀修祕密門先以淨器盛新淨水安於面前想此淨水如耨達池運心請來而作佛事內想如佛掌中而降念請水真言一七遍真言曰唵引一素上聲嚕素上聲嚕尾薩囉二娑嚩二合賀引然以此淨水運心加持想水如淨蓮池念此真言七遍以右手攪之七匝一切應用表於結淨真言曰唵引一戍上聲剔孕二合耨數馱曩上聲野二娑嚩二合賀引次想為五佛甘露水以淨六根及淨三業真言曰唵引一尾入聲麼路娜地吽薩引二次想五佛甘露水安右掌中想此智水從指五峯流出如五佛降甘露水又想如五河念此真言三遍加持然自灌頂次自飲吸三遍表淨五業五業者地水火風空所成之身先淨自身然禮於佛既禮於佛以前淨水安於瓶內用此真言加持一百八遍置於佛前真言曰唵引一儗野二合曩上聲捺劍上聲阿入聲地底入聲瑟姹二合娑嚩二合𤚥引二次至佛前安心而坐想於諸佛念此真言五遍真言曰唵引一左哩唧致二娑嚩二合賀引三次以二羽外相叉掌心按於地念淨地真言三遍想如金剛地真言曰唵引一阿去聲佉入聲引二次以二羽十度峯相交拳於罅內虛心合掌禪智竪微開安於面前念金剛寶樓閣真言三遍想印如寶樓閣真言曰唵引一嚩日囉二合句嚕二合地濕嚩二合哩引二次二羽金剛縛忍願竪於額念唵字想唵字如寶樓閣身次二羽金剛縛忍願竪進力曲微開左旋首三匝念阿去聲字想阿去聲字如寶莊佛閣次二羽金剛縛先以忍願竪進力曲微開禪智竪微開用安於心念吽字想吽字如寶閣中空次二羽外微相叉安臍仰微開念姹入聲字想姹字如雜寶地次以二羽背微交面前直立想如界牆此契不改左旋於首三匝想印如輪摧於煩惱念金剛結界真言七遍唵引一嚩日囉二合鉢囉二合迦㘑曩上聲嚩日囉二合滿馱禰曩上聲二唵引三砧去聲吽嚩日囉二合囉上聲乞囉二合引四已上從淨地至結界並執鈴杵作印用之也次以左手執鈴右手執杵作蓮華印齊於頂上禮然可以杵仰手立杵安臍鈴安腰側念金剛鈴真言五遍唵引一嚩素上聲麼底二嚩素上聲室哩二合曳三室哩二合伽姹入聲禰娜禰怛覩哩二合四阿上聲仡哩二合薩五娑嚩二合賀引次念金剛杵真言五遍唵引一達囉磨二合馱覩蘖鼻二囉怛曩二合嚩日囉二合地瑟姹二合曩上聲三地瑟恥二合帝四底入聲瑟姹二合娑嚩二合𤚥上聲吽引五念真言已鈴執常式杵擲三遍振鈴三遍半其鈴杵安置盤中然以右手灑前淨水真言與水壇同次灑塗香加持三遍真言曰唵引一嚩日囉二合巘第𩕳跛尾入聲怛囉二合穆棄吽引二然以右手橫金剛杵用按於地左手掐珠念數珠真言三七遍加持於地成佛華壇以表結淨真言曰唵引一嚩素上聲麼上聲底室哩二合曳二娑嚩二合賀引三次以前淨器或瓶內水以手散灑佛前供床或於地上塗結水壇以此真言加持三遍真言曰唵引一嚩囉嚩三去聲部惹鉢囉二合嚩囉三去聲部祖二娑嚩二合賀引次以華散於水壇上凡散一華想一尊種智之字先五如來次四波羅蜜後內八菩薩如經所說次想外供養十二大菩薩亦如經說此十二尊士用同處合之為八布置華壇即開十二合為八者燈供養鏡供養觀自在菩薩琵琶供養歌音供養金剛手菩薩燒香供養虛空藏菩薩飲食供養甘露供養大悲菩薩衣供養舞供養地藏菩薩散華供養普賢菩薩貫華供養妙吉祥菩薩塗香供養彌勒菩薩此合為八上諸尊位如布華時各想本尊種智之字加持一遍布置其華種智之字次第當說先想五如來種智字唵引吽怛𠻴二合紇哩以三合阿入聲想四波羅蜜菩薩種智字囕𤚥上聲喯上聲黨想內八菩薩種智字乞哩二合日𠻴二合佉上聲仰上聲娑講二合顙𤚥上聲銘上聲想外八菩薩種智字𠺁入聲吽鑁斛佉上聲𠻴囕𤚥上聲餘四菩薩無種智字但念名號其名曰金剛鏡供養菩薩金剛琵琵供養菩薩金剛甘露供養菩薩金剛舞供養菩薩念此四菩薩名號并前八菩薩種智字想布華檀成十二尊想十大明王種智字藥鉢囉二合鉢怛二合尾入聲吒禰平呼麼上聲阿入聲污去聲嚩引想鉤索鎖鈴四菩薩種智字𠺁入聲吽鑁斛想種智字布置其華而成華壇然以瓶淨水二羽如蓮華先以檀戒忍次用慧方願以六峯相合用進力禪智稍曲似微開先於華壇外自己前安置好淨器一隻然捧於水瓶向外而下水注於淨器中水雖注器中心專想壇中沐浴於聖眾然念沐浴明真言誦一遍真言曰唵引一謨𩕳嚩囉麼上聲哩唧二儞哩誐二合多上聲三尾儞野二合誐曩上聲羯囉四薩謨地哩二合戴羯攞勢五抳野二合南上聲沒曩上聲鼻曬罽二合戴六娑嚩二合居入聲㘑數婆去聲細謨禮寫怛引次以塗香契散灑於華壇當以散灑時志想於二羽塗摩遍照尊念塗香真言如經廣所說次以粖香契抹於華壇上先想於佛頂次念粖香明真言念三遍奉獻於如來真言曰唵引一嚩日囉二合祖去聲哩𩕳二合末引二復以瓔珞契二羽蓮華印如繫瓔珞勢先想從佛前後想於佛頸先以進鉤力如繫佛瓔珞念瓔珞真言曰唵引一囉上聲怛曩二合二麼矩吒三阿入聲囉馱二合賀囉四布惹嚩日囉二合五吽引六次以五佛冠印契當下明先以曲檀慧次忍願峯合後戒方進力禪智竪微開用安於頂上作想與本尊而戴於寶冠真言曰如經佛耳具印契二羽金剛拳先須以進力安於右耳旋一匝鉤一鉤左耳同右耳想與本尊戴為耳莊嚴具真言曰如經佛髆瓔珞契二羽蓮華印相交右押左禪智捻檀慧方伸舒六度各於一髆想安佛髆瓔珞真言曰如經次佛腕釧印二羽金剛拳先以舒進力以進旋左腕以力旋右腕想安佛腕訓真言從瓔珞乃至腕釧契隨印各一遍又以貫華契禪智掐進力如把貫華勢先想於佛額次想於後繫真言如經說復以獻衣契二羽向外開想與佛貫衣真言如經說次以傘蓋契左羽金剛拳以立力指端右羽舒五度以平蓋力峯如蓋右旋轉想蓋華壇尊真言誦三遍真言曰唵引一薩嚩怛他去聲蘖多二擦倉刺切怛囉二合布惹銘伽三三去聲母捺囉二合四娑頗二合囉拏五三去聲麼曳引六吽引七次以然燈契右羽拳四度以忍直竪申左羽盛右羽想忍如慧燈右旋於壇上供養於如來真言誦三遍如經廣所說次以一淨器盛滿三白食三白食者粳米飯乳酪也及添於華果置於白食上面向華壇前二羽捧供養念真言三遍以加持佛飯真言曰唵引一薩嚩怛他蘖多二禰尾儞野二合三布惹窣堵二合努野麼薩四𠺁吽鑁斛引加持已先安淨器置於面前然以佛飯安左掌中右手執瓶注於淨水在於器中當下水時想獻本尊而為漱口乃誦真言加持三遍一遍一注真言曰唵引一阿沒哩二合二姤三婆去聲嚩野四薩娑嚩二合賀引爾時世尊說是華壇已告彌勒菩薩曰修此觀門學祕密行先歸命佛然以右羽搊擲杵各三遍次仰右羽於臍置杵掌中上下直立然以左羽振鈴念八大願真言誦三遍真言曰唵引一沒騰達囉𤚥二合佐二僧去聲伽去聲佐三怛哩二合羅怛曩二合蘖羅二合四麼努怛𠻴二合五母免唧黨六迦嚕弭野二合扇上聲七娑嚩二合鉢囉囉闥二合鉢囉二合悉馱曳八儞舍拏薩嚩播跛喃九奔抳野二合喃左努謨那喃十訖哩二合姤鉢嚩僧去聲左哩舍也二合弭阿去聲哩野二合瑟姹二合誐播施達十一伊上聲𤚥吠攞母播那野十二夜嚩怛二合囉底也二合囉誐弭𩕳十三夜嚩左薩素上聲哩曳二合那曳十四阿上聲底養二合多哩鉢囉二合抳麼馱十五鉢囉寫賀引囉喃十六阿上聲沒囕二合賀呼浪切左哩養二合十七怛娜引嚩迦二合鼻努去聲麼免播惹曩上聲拏播拏尾迦攞薩拏十八麼攞嚩囉曩迦儞哩二合底野二合儗怛嚩儞多十九阿儞也二合憾儞尾二合囉閉怛哩二合囉閉二十念真言竟然入壇場面向於佛坐想自身碎如微塵返收自身如金剛體默念真言曰唵引一囉祖仁祖切播誐哆薩嚩達囉磨二合二默念淨身三業真言曰唵引一娑嚩二合婆去聲嚩秫入聲馱薩嚩達囉磨二合婆嚩秫入聲度憾引二默念淨口四業真言曰唵引一嚩枳也二合秫入聲馱薩嚩達囉磨二合嚩枳也二合秫兔憾引二默念淨意三業真言曰唵引一唧哆秫入聲馱薩嚩達囉磨二合唧多秫入聲兔憾引三三業清淨已運心惡道中一切諸眾生眾罪諸障等消滅盡無餘皆