body:
  text: 宋契丹國師中天竺摩竭陀國三藏法師慈賢譯爾時世尊在舍衛國於華林園中飲食訖跏趺而坐時有彌勒菩薩等白佛言世尊我等雖聞三乘甚深妙法我有少疑欲當啓問世尊此法門外更有法不世尊告曰善哉善哉汝等何能於此而生此問我有摩訶三昧耶祕密內法依之修行能令大乘行者速得成佛吾從成佛已來未曾宣說彌勒菩薩等聞佛所說踴躍歡喜繞佛三匝却住一面右膝著地胡跪合掌瞻仰世尊目不暫捨爾時世尊入金剛定而於眉間放五色光於其光中而化五佛於青毫光中化阿閦佛於白毫光中化毗盧遮那佛於黃毫光中化寶生佛於紅毫光中化無量壽佛於緑毫光中化不空成就佛復化金剛佛眼光明菩薩金剛天眼光明菩薩金剛法眼光明菩薩金剛智眼光明菩薩金剛禪定眼光明菩薩此佛菩薩居第一院次第而坐復化八大菩薩金剛智光明眼藏菩薩金剛智光明舌藏菩薩金剛智光明鼻藏菩薩金剛智光明舌藏菩薩此四菩薩各居第二院門中而坐金剛智光明身藏菩薩金剛智光明心藏菩薩金剛智光明智藏菩薩金剛智光明慧藏菩薩此四菩薩各居第二院四隅而坐復有十二供養菩薩金剛燈光明菩薩金剛聲光明菩薩金剛香光明菩薩金剛甘露光明菩薩金剛衣光明菩薩金剛幢光明菩薩金剛舞光明菩薩金剛塗香光明菩薩此八菩薩次第而居第三院內四門左右而坐金剛散華光明菩薩金剛貫華光明菩薩金剛寶蓋光明菩薩金剛善哉光明菩薩此四菩薩次第各居第二院外四隅而坐復化四菩薩金剛光明鉤菩薩金剛光明索菩薩金剛光明鎖菩薩金剛光明鈴菩薩此四菩薩次第各居第三院內四隅而坐於其光中復化十大明王大慈金剛光明焰鬘怛迦慈明王大悲金剛光明鉢囉二合柅也二合怛迦悲明王大喜金剛光明鉢納麼二合怛迦喜明王大捨金剛光明尾蘖曩二合怛迦捨明王此四明王次第各居第三院外門中而坐金剛光明吒枳羅惹大愛明王金剛光明𩕳攞能上聲拏大威怒明王金剛光明摩賀摩攞大力明王金剛光明阿上聲左攞曩他無動明王此四明王次第各居第三院外四隅而坐下方金剛光明嚩日囉二合播哆羅降三世明王此明王居東方明王前面而坐上方金剛光明塢瑟抳二合灑作乞囉二合嚩哩帝二合頂輪明王此明王居西方明王前面而坐此二明王布置如是心想上下二方爾時世尊於其光中現如是神變成大曼拏羅壇現如是已彌勒菩薩等從座而起於其會中共相推問如是不可思議大神變事曾見聞不諸大菩薩等咸皆踴躍歡喜悲淚而言此大神變甚深不可思議未曾有法善哉希有彌勒菩薩等咸生歡喜共說偈曰我等踊躍無上喜今覩五色大毫光阿上聲護素上聲尾娑麼二合野弭曩上聲引一光中復現衆聖賢依方坐成曼拏羅阿上聲護訕怛沫底孕二合儞哩二合養引二得見希奇難思事我誓修行等遍知阿上聲護播囉麼禰麼曩上聲引三慈悲為演祕密門稽首願成無上覺阿上聲護僧去聲娑囉僧去聲怛底引四爾時彌勒菩薩與諸大菩薩等共說偈已白佛言世尊我等已見如是大神變事慈悲哀愍為我宣說爾時世尊告彌勒菩薩等善哉善哉汝等真大丈夫有大智慧我此三昧耶祕密法門難信難解汝等所問滿吾所願彌勒菩薩等聞如是語從座而起四門而拜壇場衆共說偈曰我等從無始時來野娜拏上聲禰末底婆塢擬二合一所有一切不善業三去聲麼娑多二合僧羯攞二合跛三去聲婆哩二合黨迦呂商上聲二世尊大慈哀愍我怛儞舍夜弭微地嚩多二合三聽我懺悔障消滅摩賀訖哩二合跛曩上聲補囉娑迦楞上聲四一切諸佛及菩薩三母馱冒地薩怛吠二合一八部龍王諸聖衆囉上聲哩曳二合囉儞室者二合野怛訖哩二合黨矩舍朗二我皆稽首歸命禮阿上聲努謨儞也二合怛娜嚩勢爽三咸願速登無上覺三去聲弭野二合迦鉢哩曩麼野弭三去聲冒兔四三昧耶法如影像謎攞灑多二合麼努沫哩努一世尊大慈早敷演鉢囉二合娑上聲儞怛難上聲怛娑怛二合訖哩二合補播養一諸佛祕密最上法設囉喃鉢囉二合野弭素上聲我黨三我今三業精進行娜怛麼努嚩哩二合底曩上聲儞底養二合四大慈願演離垢法儞哩二合穆屈多二合塞蘇葛切葛攞二合葛攞二合鉢娜一我等所求菩提果沫勢灑薩怛嚩二合三去聲鉢那馱朗二普令悟解此法門達囉𤚥二合鉢囉二合野弭設囉喃上聲三增長菩提離諸趣三去聲麼薩怛鑁二合悉底二合迦囉薩嚕喯補憾切四云何免離三塗苦三去聲弭野二合迦儞囉娑多二合曼捺娜一正遍知尊垂慈救母怛麼迦嚕拏薩麼囉閉二合多室哩二合講二普願衆生咸出離母儞哆去聲儞謨鉢囉二合尾瑟知二合江三我誓讚佛歸依禮蘗妬悉弭二合設囉喃去聲野底舍誐喃上聲四願證無生清淨身阿上聲舍野尾播迦秫入聲地野二合一所願煩惱皆斷除薩嚩嚩哩二合底嚩薩曩薩母怛伽去聲底二於菩提心恆不斷塢怛播二合娜野弭冒馱三以我功德自莊嚴嚩儞穆訖帝二合尾都舍南上聲唧哆四求佛菩薩菩提路薩素上聲怛素上聲誐底迦囉麼二合巘一十波羅蜜願圓滿捺舍尾馱娜曩上聲儞二獲大清淨妙法身秫矩攞二合虞上聲曩上聲喯補憾切三我等云何同於佛三母馱怛麼二合三麼娑黨二合四應機演說大壇場娑嚩二合婆去聲嚩秫馱三去聲麼設哩二合妒娑弭也二合度曩上聲世尊大慈憐愍我訖哩二合播野嚩㘕弭野二合沫綺朗二合二令我斷除諸障染跡迦弭麼上聲儞哩二合瑟致二合惹攞跛哩曩上聲馱岡二合三普證無上大菩提三去聲冒地唧哆沫覩朗四願示我等曼拏法尾婆去聲弭野二合尾地儞底滿底哩二合寫多一得離虛妄證菩提戌娘上聲娑嚩二合婆去聲嚩尾囉賀二表示有無根本法呬上聲覩尾庾誐怛他儞張二合覩三精進奉持諸佛教塢賀播誐麼捺伽上聲朗四同證無為寂滅樂嚩無求切窣覩二合鉢囉二合抳馱娜哩二合穆訖黨二合爾時彌勒菩薩等共說偈已白佛言世尊我等得見此壇作何行願修此法門世尊告曰汝等先受五瓶灌頂當為汝說祕要法門彌勒菩薩等聞是語已白佛言世尊大慈哀愍我等願受灌頂世尊告曰汝等求受灌頂吾為汝等加持五瓶四寶末五河水五香末五穀五種子五藏物五色綵五菩提葉五時華五吉祥草五色線五傘蓋生飯三分加持五瓶中方水精寶瓶白色表於佛瓶表金剛根本波羅蜜菩薩以菩薩真言加持一百八遍真言曰唵引一商上聲羯哩二扇底羯哩三虞入聲吒𩕳四佉去聲吒野五薩嚩囉撻二合六娑去聲馱野七娑嚩二合賀引八加持寶瓶授大灌頂獲無生滅堅固之身東方碼瑙寶瓶青色表於佛瓶表金剛波羅蜜菩薩以菩薩真言加持一百八遍真言曰唵引薩怛嚩二合嚩日哩二合吽引加持寶瓶授大灌頂獲金剛不壞堅固之身南方摩尼寶瓶黃色表於佛瓶表寶波羅蜜菩薩以菩薩真言加持一百八遍真言曰唵引囉怛曩二合嚩日哩二合怛朗二合引加持寶瓶授大灌頂獲諸珍寶圓滿之身西方珊瑚寶瓶紅色表於佛瓶表法波羅蜜菩薩以菩薩真言加持一百八遍真言曰唵引達摩嚩日哩二合𠶹哩以二合引加持寶瓶授大灌頂獲自受用智慧之身北方琉璃寶瓶緑色表於佛瓶表羯磨波羅蜜菩薩以菩薩真言加持一百八遍真言曰唵引羯磨嚩日哩二合惡引加持寶瓶授大灌頂獲五如來堅固之身五波羅蜜菩薩印契金剛波羅蜜菩薩二羽金剛嚩忍願竪如針名金剛心印寶波羅蜜菩薩不改前印相進力附忍願掐忍願上節名金剛寶印法波羅蜜菩薩二羽金剛掌如蓮華開敷進力相鉤形禪智亦如是峯各不相著名金剛法印羯磨波羅蜜菩薩二羽金剛縛忍願檀慧竪是名羯磨印金剛根本波羅蜜菩薩二羽交八度峯交指罅內忍願如寶形禪智右押左伸而附進力二掌虛於心是名本母印加持四寶末金銀銅鐵以此四寶末未入瓶時共盛一器以寶生如來寶波羅蜜菩薩真言各加持一百八遍既加持已分四寶末安五瓶內授大灌頂獲金剛身加持五河水蘗誐河琰母娜河信度河縛芻河泥連繕那河以此五河表五佛水佛水法水寶水羯磨水智水以此五水沐浴凡夫無量劫來一切障染皆得清淨獲五吉祥佛吉祥法吉祥寶吉祥羯磨吉祥智吉祥以此五水共盛一器以無量壽佛法波羅蜜菩薩真言各持一百八遍既加持已分其五水安五瓶內授大灌頂獲法王身加持五香末白栴檀香紅栴檀香牛頭香工骨摩香龍腦香以此五香變為細末共盛一器念不空如來羯磨波羅蜜菩薩真言各加持一百八遍既加持已分其五香安五瓶內表五佛香佛香法香寶香羯磨香智香以此五香授大灌頂獲得如來五分法身之香所辦事業皆得成就加持五穀稻穀青芝麻大麥菉豆以此五穀共盛一器以阿閦如來金剛波羅蜜真言各加持一百八遍既加持已安五瓶內又此五穀地水火風空所成表五佛種子佛種子法種子寶種子智種子金剛種子凡夫五種子於六道四生循環往來五佛種子授大灌頂常住不滅加持五種子白芥子紫芥子黃芥子蔓菁子蒔蘿子此五種子先以淨水各別淘澤共盛一器以十大明王真言加持一七遍爾時世尊即說十大明王真言東方焰曼怛迦大明王真言曰曩上聲莫三滿多一迦野嚩迦唧二合哆二嚩日囉二合南三唵引四佉佉佉呬佉呬五訥瑟吒二合六薩怛嚩二合那麼迦七阿上聲枲母舍攞八播囉戍播灑九賀娑哆二合野拶覩嚕母二合佉十拶覩嚕部二合惹十一捨吒拶囉曩上聲十二阿上聲蘖蹉十三薩囉嚩二合訥瑟吒二合十四播囉鉢囉二合曩十五播賀哩十六摩賀尾入聲覲曩二合佉怛迦十七尾訖哩二合哆拏曩十八薩囉嚩二合部哆婆去聲養上聲迦囉十九阿上聲吒吒賀娑上聲二十曩儞𩕳二十一弭野二合伽囉二合拶囉麼二合𩕳嚩薩曩二十二矩嚕矩嚕二十三薩囉嚩二合迦囉𤚥二合二十四親去聲那親去聲那二十五薩囉嚩二合滿怛𠻴二合𭷓那𭷓那二十六播囉母捺囉二合阿上聲羯哩二合舍野阿上聲羯哩二合捨野二十七薩囉嚩二合部黨引儞哩二合麼闥二十八薩囉嚩二合訥瑟吒二合鉢囉二合吠舍野鉢囉二合吠舍野二十九曼拏囉沫地曳二合三十吠嚩娑嚩二合哆怛三十一𠰒尾哆跢入聲迦囉野矩嚕矩嚕三十二麼麼迦哩養二合三十三娜賀娜賀三十四鉢左鉢左三十五麼尾囕嚩麼尾囕嚩三十六三去聲麼野麼努引娑麼二合囉三十七吽吽三十八癹吒半音癹吒三十九娑普二合吒野娑普二合吒野四十薩囉嚩二合訥瑟吒二合哩補董二合四十一迦囉迦囉四十二曀呬曀呬入聲四十三婆誐鑁四十四緊唧囉野枲四十五薩囉嚩二合部黨娑馱野四十六娑嚩二合賀引此大明王心坦平等饒益有情若有受持讀誦此真言者所求願滿阿閦如來化身南方鉢囉二合抳也二合怛迦大明王真言曰曩莫三去聲滿多一迦野嚩迦唧二合哆二嚩日囉二合南三曩謨嚩日囉二合句嚕二合馱野四麼賀引捺𠻴二合瑟吒塢二合怛迦二合吒婆去聲野五鼻囉嚩野六阿枲母捨攞七播舍賀娑哆二合野八吽阿上聲密哩二合哆君上聲拏梨九佉佉佉呬佉呬十底瑟吒二合底瑟吒二合十一滿馱滿馱十二賀曩賀曩十三那賀那賀十四蘗哩二合惹蘗哩二合惹十五尾娑普二合吒野尾娑普二合吒野十六薩囉嚩二合尾勤曩二合尾曩野迦十七摩賀誐曩鉢底𠰒尾耽怛入聲迦囉上聲野十八娑嚩二合賀引此大明王有大威力若有人等受持讀誦此真言者所作事業速得成就一切天魔不能惱亂毗盧